# Build, publish, and deploy the API to MonsterASP.NET via FTPS.
# Required secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD,
#                   PRODUCTION_CONNECTION_STRING, JWT_KEY, ADMIN_PASSWORD,
#                   ALLOWED_ORIGINS, APP_BASE_URL,
#                   EMAIL_HOST, EMAIL_USERNAME, EMAIL_PASSWORD, EMAIL_FROM_ADDRESS
# Optional secrets: JWT_ISSUER, JWT_AUDIENCE, FTP_SERVER_DIR, ALLOWED_HOSTS,
#                   SITE_URL (public https URL, e.g. https://site1234.monsterasp.net),
#                   EMAIL_PORT (default 587), EMAIL_FROM_NAME, EMAIL_ENABLE_SSL (default true)

name: Deploy to MonsterASP (FTPS)

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-monsterasp-production
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        shell: pwsh
        run: |
          git fetch --tags --quiet
          $latest = git tag --sort=-v:refname | Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } | Select-Object -First 1
          if (-not $latest) {
            $newVersion = "1.0.0"
          } else {
            $parts = $latest.TrimStart('v') -split '\.'
            $newVersion = "$([int]$parts[0]).$([int]$parts[1]).$([int]$parts[2] + 1)"
          }
          Write-Host "Next version: $newVersion (tag: v$newVersion)"
          "version=$newVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$newVersion"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Validate required GitHub secrets
        shell: pwsh
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          PRODUCTION_CONNECTION_STRING: ${{ secrets.PRODUCTION_CONNECTION_STRING }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM_ADDRESS: ${{ secrets.EMAIL_FROM_ADDRESS }}
        run: |
          $required = @(
            @{ Name = 'FTP_SERVER';                    Value = $env:FTP_SERVER },
            @{ Name = 'FTP_USERNAME';                  Value = $env:FTP_USERNAME },
            @{ Name = 'FTP_PASSWORD';                  Value = $env:FTP_PASSWORD },
            @{ Name = 'PRODUCTION_CONNECTION_STRING';  Value = $env:PRODUCTION_CONNECTION_STRING },
            @{ Name = 'JWT_KEY';                       Value = $env:JWT_KEY },
            @{ Name = 'ADMIN_PASSWORD';                Value = $env:ADMIN_PASSWORD },
            @{ Name = 'ALLOWED_ORIGINS';               Value = $env:ALLOWED_ORIGINS },
            @{ Name = 'APP_BASE_URL';                  Value = $env:APP_BASE_URL },
            @{ Name = 'EMAIL_HOST';                    Value = $env:EMAIL_HOST },
            @{ Name = 'EMAIL_USERNAME';                Value = $env:EMAIL_USERNAME },
            @{ Name = 'EMAIL_PASSWORD';                Value = $env:EMAIL_PASSWORD },
            @{ Name = 'EMAIL_FROM_ADDRESS';            Value = $env:EMAIL_FROM_ADDRESS }
          )
          $missing = @($required | Where-Object { [string]::IsNullOrWhiteSpace($_.Value) } | ForEach-Object { $_.Name })
          if ($missing.Count -gt 0) {
            throw "Missing required repository secrets: $($missing -join ', ')"
          }
          if ($env:JWT_KEY.Length -lt 32) {
            throw "JWT_KEY must be at least 32 characters long."
          }
          if (-not $env:APP_BASE_URL.StartsWith("https://")) {
            throw "APP_BASE_URL must start with 'https://' — got: $($env:APP_BASE_URL)"
          }

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore (win-x86)
        run: dotnet restore src/Api/Api.csproj -r win-x86

      - name: Publish for MonsterASP (win-x86)
        run: >
          dotnet publish src/Api/Api.csproj
          --configuration Release
          --output ./publish
          --runtime win-x86
          --no-restore
          -p:Version=${{ steps.version.outputs.version }}

      - name: Write production appsettings from GitHub secrets
        shell: pwsh
        env:
          CONNECTION_STRING: ${{ secrets.PRODUCTION_CONNECTION_STRING }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
          SITE_URL: ${{ secrets.SITE_URL }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM_ADDRESS: ${{ secrets.EMAIL_FROM_ADDRESS }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
          EMAIL_ENABLE_SSL: ${{ secrets.EMAIL_ENABLE_SSL }}
        run: |
          $issuer      = if ([string]::IsNullOrWhiteSpace($env:JWT_ISSUER))    { "MultiTenantPlatform" }     else { $env:JWT_ISSUER }
          $audience    = if ([string]::IsNullOrWhiteSpace($env:JWT_AUDIENCE))  { "MultiTenantPlatformUsers" } else { $env:JWT_AUDIENCE }
          $allowedHostsValue = if ([string]::IsNullOrWhiteSpace($env:ALLOWED_HOSTS)) { "*" } else { $env:ALLOWED_HOSTS }

          $originsRaw = $env:ALLOWED_ORIGINS
          if ([string]::IsNullOrWhiteSpace($originsRaw) -and -not [string]::IsNullOrWhiteSpace($env:SITE_URL)) {
            $originsRaw = $env:SITE_URL.Trim().TrimEnd('/')
            Write-Host "ALLOWED_ORIGINS not set; using SITE_URL as CORS origin: $originsRaw"
          }
          $origins = if ([string]::IsNullOrWhiteSpace($originsRaw)) { @() } else { $originsRaw -split ',' | ForEach-Object { $_.Trim() } }

          $emailPort      = if ([string]::IsNullOrWhiteSpace($env:EMAIL_PORT))       { 587 }                      else { [int]$env:EMAIL_PORT }
          $emailFromName  = if ([string]::IsNullOrWhiteSpace($env:EMAIL_FROM_NAME))  { "MultiTenant Platform" }   else { $env:EMAIL_FROM_NAME }
          $emailEnableSsl = if ([string]::IsNullOrWhiteSpace($env:EMAIL_ENABLE_SSL)) { $true }                    else { [System.Convert]::ToBoolean($env:EMAIL_ENABLE_SSL) }

          $settings = @{
            ApplyMigrationsOnStartup = $true
            ApplySeedsOnStartup      = $true
            ConnectionStrings        = @{ DefaultConnection = $env:CONNECTION_STRING }
            Jwt = @{
              Issuer        = $issuer
              Audience      = $audience
              Key           = $env:JWT_KEY
              ExpiryMinutes = 60
            }
            Seeding = @{
              AdminPassword = $env:ADMIN_PASSWORD
            }
            Swagger = @{
              EnabledInProduction = $true
              AdminUsername       = "admin@system.com"
              AdminPassword       = $env:ADMIN_PASSWORD
              SessionHours        = 8
            }
            AllowedOrigins = $origins
            AppBaseUrl     = $env:APP_BASE_URL
            Email = @{
              Host          = $env:EMAIL_HOST
              Port          = $emailPort
              Username      = $env:EMAIL_USERNAME
              Password      = $env:EMAIL_PASSWORD
              FromAddress   = $env:EMAIL_FROM_ADDRESS
              FromName      = $emailFromName
              EnableSsl     = $emailEnableSsl
            }
            FileStorage = @{
              BasePath         = "storage"
              MaxFileSizeBytes = 10485760
            }
            Caching = @{
              PermissionCatalogMinutes = 10
              RolePermissionsMinutes   = 5
              TenantCatalogMinutes     = 5
              TenantDetailMinutes      = 5
              ProductListMinutes       = 3
              ReportSummaryMinutes     = 2
            }
            Serilog = @{
              MinimumLevel = @{
                Default                = "Warning"
                "Microsoft.AspNetCore" = "Warning"
              }
            }
            Logging = @{
              LogLevel = @{
                Default                = "Warning"
                "Microsoft.AspNetCore" = "Warning"
              }
            }
            AllowedHosts = $allowedHostsValue
          }

          $json = $settings | ConvertTo-Json -Depth 6
          Set-Content -Path "./publish/appsettings.Production.json" -Value $json -Encoding utf8

      - name: Apply IIS web.config for MonsterASP
        shell: pwsh
        run: |
          Copy-Item deploy/web.config ./publish/web.config -Force
          New-Item -ItemType Directory -Force -Path ./publish/logs | Out-Null

      # IIS locks Api.dll while the site runs. app_offline.htm stops the app before file replace.
      - name: Stage app_offline.htm
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./ftp-app-offline | Out-Null
          Copy-Item deploy/app_offline.htm ./ftp-app-offline/app_offline.htm

      - name: Stop site (upload app_offline.htm)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./ftp-app-offline/
          server-dir: ${{ secrets.FTP_SERVER_DIR || '/wwwroot/' }}
          dangerous-clean-slate: false
          log-level: minimal

      - name: Wait for IIS to release file locks
        run: powershell -Command "Start-Sleep -Seconds 20"

      - name: Deploy to MonsterASP FTPS (wwwroot)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./publish/
          server-dir: ${{ secrets.FTP_SERVER_DIR || '/wwwroot/' }}
          dangerous-clean-slate: false
          log-level: standard
          exclude: |
            **/*.pdb

      - name: Start site (remove app_offline.htm)
        shell: pwsh
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR || '/wwwroot/' }}
        run: |
          $dir        = $env:FTP_SERVER_DIR.Trim().TrimEnd('/')
          $remotePath = "$dir/app_offline.htm"
          & ./deploy/ftp-remove-file.ps1 -Server $env:FTP_SERVER -Username $env:FTP_USERNAME -Password $env:FTP_PASSWORD -RemotePath $remotePath

      - name: Smoke test – verify API health endpoint
        shell: pwsh
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SITE_URL)) {
            Write-Warning "SITE_URL secret is not set. Smoke test will try FTP host only (often wrong)."
          }

          ./deploy/smoke-test.ps1 `
            -FtpServer $env:FTP_SERVER `
            -SiteUrl $env:SITE_URL `
            -MaxAttempts 10 `
            -InitialDelaySeconds 45 `
            -RetryDelaySeconds 15

      - name: Tag release
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
          Write-Host "Tagged ${{ steps.version.outputs.tag }}"
